# fly.toml app configuration file generated for bookshelf-app-withered-valley-8854 on 2026-05-26T23:26:56+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bookshelf-app-withered-valley-8854'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile.prod'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[[mounts]]
  source = 'data'
  destination = '/app/data'
  initial_size = '1gb'

[http_service]
  internal_port = 3000
  processes = ['app']

  [[http_service.checks]]
    interval = '30µs'
    timeout = '5µs'
    grace_period = '5s'
    method = 'get'
    path = '/health'
    protocol = 'http'

[[services]]
  protocol = 'tcp'
  internal_port = 3000
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[metrics]]
  port = 9090
