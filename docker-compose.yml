version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookshelf-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: file:/app/data/bookshelf.db
      JWT_SECRET: your-secret-key-change-in-production
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - sqlite_data:/app/data
    depends_on:
      - redis
    networks:
      - bookshelf-network
    command: sh -c "npm install && npx prisma db push --accept-data-loss && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookshelf-frontend
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - bookshelf-network
    command: sh -c "npm install && npm run dev"

  redis:
    image: redis:7-alpine
    container_name: bookshelf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bookshelf-network
    command: redis-server --appendonly yes

volumes:
  sqlite_data:
  redis_data:

networks:
  bookshelf-network:
    driver: bridge
